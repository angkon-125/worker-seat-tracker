version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: seat-tracker-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=worker_seat_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    container_name: seat-tracker-backend
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/worker_seat_tracker
      - APP_NAME=Worker Seat Tracker
      - DEBUG=True
      - YOLO_MODEL_PATH=yolov8n.pt
      - FRAME_SKIP=5
      - OCCUPANCY_THRESHOLD=0.3
      - SEAT_EXIT_DELAY_SECONDS=5
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: 
      context: ../frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    container_name: seat-tracker-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
